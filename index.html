<html lang="en" data-theme="light"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 3 Risks Management</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  /* ── DARK THEME (default) ── */
  [data-theme="dark"] {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --surface3: #1e2d42;
    --border: #1f2d42;
    --accent: #6450dc;
    --accent2: #8b78f0;
    --accent-alt: #3ca0b4;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #64748b;
    --card-bg: #111827;
    --header-bg: #0d1424;
    --not-started-bg: rgba(239,68,68,0.15);
    --not-started-color: #ef4444;
    --in-progress-bg: rgba(245,158,11,0.15);
    --in-progress-color: #f59e0b;
    --done-bg: rgba(100,80,220,0.2);
    --done-color: #8b78f0;
    --surface3-btn: #1e2d42;
    --toggle-bg: #1a2235;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  /* ── LIGHT THEME ── */
  [data-theme="light"] {
    --bg: #f0f0f0;
    --surface: #ffffff;
    --surface2: #f5f5f8;
    --surface3: #ebebf0;
    --border: #dcdcf0;
    --accent: #6450dc;
    --accent2: #5040c8;
    --accent-alt: #3ca0b4;
    --text: #1a1a2e;
    --text2: #5a5a7a;
    --text3: #9090a8;
    --card-bg: #ffffff;
    --header-bg: #ffffff;
    --not-started-bg: rgba(239,68,68,0.1);
    --not-started-color: #dc2626;
    --in-progress-bg: rgba(245,158,11,0.12);
    --in-progress-color: #d97706;
    --done-bg: rgba(100,80,220,0.12);
    --done-color: #6450dc;
    --surface3-btn: #ebebf0;
    --toggle-bg: #e8e8f0;
    --shadow: 0 4px 20px rgba(100,80,220,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* ── ENTRY SCREEN ── */
  #entry-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
    transition: background 0.3s;
  }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 56px 72px;
    display: flex; flex-direction: column;
    align-items: center; gap: 24px;
    box-shadow: var(--shadow);
    min-width: 420px;
  }

  .entry-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #6450dc, #3ca0b4);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px rgba(100,80,220,0.35);
    animation: pulse-glow 2.5s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 30px rgba(100,80,220,0.3); }
    50% { box-shadow: 0 0 55px rgba(100,80,220,0.55); }
  }

  .entry-title {
    font-size: 24px; font-weight: 800;
    background: linear-gradient(135deg, #6450dc, #3ca0b4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-align: center; line-height: 1.3;
  }

  .entry-subtitle {
    font-size: 12px; color: var(--text2); text-align: center;
    letter-spacing: 2px; text-transform: uppercase;
    margin-top: -12px;
  }

  .entry-hse {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    background: var(--done-bg);
    padding: 5px 14px;
    border-radius: 99px;
    margin-top: -8px;
  }

  .entry-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6450dc, #5040c8);
    border: none; border-radius: 12px;
    color: #fff; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.5px;
    box-shadow: 0 6px 24px rgba(100,80,220,0.4);
    transition: all 0.3s;
  }

  .entry-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(100,80,220,0.55);
  }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    display: flex; align-items: center; gap: 0;
    background: var(--toggle-bg);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px;
  }

  .theme-btn {
    padding: 6px 14px; border-radius: 99px;
    border: none; cursor: pointer;
    font-size: 12px; font-weight: 600;
    transition: all 0.25s;
    background: transparent;
    color: var(--text2);
  }

  .theme-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(100,80,220,0.4);
  }

  /* ── MAIN APP ── */
  #app { display: none; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
    transition: background 0.3s;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .header-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #6450dc, #3ca0b4);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  .header-title {
    font-size: 15px; font-weight: 700;
    background: linear-gradient(135deg, #6450dc, #3ca0b4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .header-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px; color: var(--text2);
    letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── HOME ── */
  #home-view { padding: 36px 32px; }

  .home-header { margin-bottom: 32px; }
  .home-header h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .home-header p { color: var(--text2); font-size: 13px; }

  /* Global stats */
  .global-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 14px; margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
    transition: background 0.3s;
  }

  .stat-icon {
    width: 42px; height: 42px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .stat-icon.purple { background: rgba(100,80,220,0.15); }
  .stat-icon.yellow { background: rgba(245,158,11,0.15); }
  .stat-icon.red { background: rgba(239,68,68,0.15); }

  .stat-info p { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .stat-info h3 { font-size: 26px; font-weight: 800; }
  .stat-info h3.purple { color: var(--done-color); }
  .stat-info h3.yellow { color: var(--in-progress-color); }
  .stat-info h3.red { color: var(--not-started-color); }

  /* Region cards */
  .regions-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }

  .region-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow);
  }

  .region-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #6450dc, #3ca0b4);
    opacity: 0; transition: opacity 0.3s;
  }

  .region-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(100,80,220,0.15); }
  .region-card:hover::before { opacity: 1; }

  .region-card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 18px; gap: 12px;
  }

  .region-flag { font-size: 30px; flex-shrink: 0; }

  .region-info { flex: 1; }
  .region-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .region-info p { font-size: 12px; color: var(--text2); }

  .region-arrow { color: var(--text3); font-size: 16px; transition: transform 0.3s, color 0.3s; }
  .region-card:hover .region-arrow { color: var(--accent); transform: translateX(4px); }

  /* Thermometer */
  .thermo-wrap { margin-bottom: 14px; }
  .thermo-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .thermo-label span { font-size: 12px; color: var(--text2); }
  .thermo-label strong { font-size: 17px; font-weight: 800; color: var(--done-color); }

  .thermo-track { height: 8px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
  .thermo-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #6450dc, #3ca0b4); transition: width 1s cubic-bezier(0.4,0,0.2,1); }

  .region-status-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .mini-pill {
    padding: 3px 10px; border-radius: 99px;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }
  .mini-pill.done { background: var(--done-bg); color: var(--done-color); }
  .mini-pill.progress { background: var(--in-progress-bg); color: var(--in-progress-color); }
  .mini-pill.notstarted { background: var(--not-started-bg); color: var(--not-started-color); }

  /* ── REGION VIEW ── */
  #region-view { display: none; padding: 28px 32px; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--text2); font-size: 13px; font-weight: 500;
    cursor: pointer; margin-bottom: 24px;
    transition: color 0.2s; background: none; border: none;
  }
  .back-btn:hover { color: var(--accent); }

  .region-view-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .region-view-flag { font-size: 44px; }
  .region-view-info h2 { font-size: 22px; font-weight: 800; margin-bottom: 3px; }
  .region-view-info p { color: var(--text2); font-size: 13px; }

  .region-progress-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 20px;
    box-shadow: var(--shadow);
  }

  .rpb-label { font-size: 13px; color: var(--text2); white-space: nowrap; }
  .rpb-track { flex: 1; height: 10px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
  .rpb-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #6450dc, #3ca0b4); transition: width 0.8s; }
  .rpb-pct { font-size: 22px; font-weight: 800; color: var(--done-color); white-space: nowrap; min-width: 48px; text-align: right; }

  /* Themes */
  .theme-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: background 0.3s;
  }

  .theme-header {
    padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: background 0.2s; user-select: none;
  }
  .theme-header:hover { background: var(--surface2); }

  .theme-header-left { display: flex; align-items: center; gap: 12px; }

  .theme-number {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #6450dc, #3ca0b4);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0;
  }

  .theme-title { font-size: 15px; font-weight: 700; line-height: 1.4; }

  .theme-header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .theme-progress-mini { display: flex; align-items: center; gap: 8px; }
  .tpm-track { width: 72px; height: 6px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
  .tpm-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #6450dc, #3ca0b4); transition: width 0.8s; }
  .tpm-pct { font-size: 13px; font-weight: 700; color: var(--done-color); min-width: 32px; text-align: right; }

  .theme-chevron { color: var(--text3); font-size: 12px; transition: transform 0.3s; }

  .theme-body { display: none; }
  .theme-body.open { display: block; }

  /* Action rows */
  .action-row {
    border-top: 1px solid var(--border);
    padding: 18px 24px;
    display: flex; align-items: flex-start; gap: 14px;
    transition: background 0.2s;
  }
  .action-row:hover { background: var(--surface2); }

  .action-index {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--surface3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text2);
    flex-shrink: 0; margin-top: 2px;
  }

  .action-content { flex: 1; min-width: 0; }
  .action-title { font-size: 13px; font-weight: 500; line-height: 1.5; margin-bottom: 8px; color: var(--text); }
  .action-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* Status buttons */
  .status-btn-group { display: flex; gap: 4px; }

  .status-btn {
    padding: 5px 14px; border-radius: 99px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1.5px solid transparent;
    transition: all 0.2s;
    background: var(--surface3-btn); color: var(--text2);
  }
  .status-btn:hover { border-color: currentColor; opacity: 0.85; }

  .status-btn.active-notstarted { background: var(--not-started-bg); color: var(--not-started-color); border-color: var(--not-started-color); }
  .status-btn.active-inprogress { background: var(--in-progress-bg); color: var(--in-progress-color); border-color: var(--in-progress-color); }
  .status-btn.active-done { background: var(--done-bg); color: var(--done-color); border-color: var(--done-color); }

  /* Notes */
  .action-notes-wrap { margin-top: 8px; }

  .notes-toggle {
    background: none; border: none;
    font-size: 13px; color: var(--text3);
    cursor: pointer; display: flex; align-items: center; gap: 4px;
    transition: color 0.2s;
  }
  .notes-toggle:hover { color: var(--accent2); }

  .notes-area { display: none; margin-top: 8px; }
  .notes-area.open { display: block; }

  .notes-textarea {
    width: 100%; min-height: 70px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text); font-size: 14px;
    font-family: 'Inter', sans-serif;
    padding: 10px 12px; resize: vertical;
    transition: border-color 0.2s; outline: none; line-height: 1.6;
  }
  .notes-textarea:focus { border-color: var(--accent); }
  .notes-textarea::placeholder { color: var(--text3); }

  .notes-save-btn {
    margin-top: 6px; padding: 5px 14px;
    background: linear-gradient(135deg, #6450dc, #3ca0b4);
    border: none; border-radius: 6px;
    color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .notes-save-btn:hover { opacity: 0.85; }

  .note-item {
    display: flex; align-items: flex-start; gap: 8px;
    margin-top: 8px;
    background: var(--surface3);
    border-radius: 8px;
    padding: 8px 10px;
    position: relative;
  }

  .note-bullet { font-size: 13px; flex-shrink: 0; margin-top: 1px; }

  .note-item-body { flex: 1; min-width: 0; }

  .note-item-text {
    font-size: 13px; color: var(--text);
    line-height: 1.6; word-break: break-word;
  }

  .note-item-time {
    font-size: 10px; color: var(--text3);
    margin-top: 3px;
  }

  .note-delete-btn {
    background: none; border: none;
    color: var(--text3); font-size: 15px;
    cursor: pointer; flex-shrink: 0;
    line-height: 1; padding: 0 2px;
    transition: color 0.2s;
  }
  .note-delete-btn:hover { color: var(--not-started-color); }

  .note-edit-btn {
    background: none; border: none;
    font-size: 13px; cursor: pointer;
    flex-shrink: 0; line-height: 1;
    padding: 0 2px; opacity: 0.5;
    transition: opacity 0.2s;
  }
  .note-edit-btn:hover { opacity: 1; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 11px 18px;
    font-size: 13px; color: var(--done-color);
    display: flex; align-items: center; gap: 8px;
    opacity: 0; transform: translateY(10px);
    transition: all 0.3s; pointer-events: none; z-index: 999;
    box-shadow: var(--shadow);
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  @media (max-width: 768px) {
    .regions-grid { grid-template-columns: 1fr; }

<script>
// ── DATA ──

// ── STATE ──
let state = {};
let pendingSaves = {}; // keys recently saved, protect from sync overwrite for 10s

function stateKey(rId, tIdx, aIdx) { return `${rId}_${tIdx}_${aIdx}`; }

function initState() {
  DATA.forEach(r => {
    r.themes.forEach((t, ti) => {
      t.actions.forEach((_, ai) => {
        const k = stateKey(r.id, ti, ai);
        if (!state[k]) state[k] = { status: t.defaultStatus[ai], notes: [] };
        // migrate old string notes to array
        if (typeof state[k].notes === "string") {
          state[k].notes = state[k].notes ? [{ text: state[k].notes, time: "" }] : [];
        }
      });
    });
  });
}

function saveState() {
  // State is stored in Sheets only — localStorage not used for data
}

function loadState() {
  // State comes from Sheets only — ignore any localStorage data
  // Clear old cached state if exists
  try { localStorage.removeItem("hse_state_v3"); } catch(e){}
}

// ── THEME ──
function setTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("btn-dark").classList.toggle("active", theme === "dark");
  document.getElementById("btn-light").classList.toggle("active", theme === "light");
  try { localStorage.setItem("hse_theme", theme); } catch(e){}
}

function loadTheme() {
  try {
    const t = localStorage.getItem("hse_theme") || "light";
    setTheme(t);
  } catch(e){ setTheme("light"); }
}

// ── CALCULATIONS ──
function regionStats(region) {
  let done=0, inprog=0, notst=0, total=0;
  region.themes.forEach((t,ti) => {
    t.actions.forEach((_,ai) => {
      const s = state[stateKey(region.id, ti, ai)]?.status || "not-started";
      total++;
      if(s==="done") done++;
      else if(s==="in-progress") inprog++;
      else notst++;
    });
  });
  return { done, inprog, notst, total, pct: total ? Math.round((done/total)*100) : 0 };
}

function globalStats() {
  let done=0, inprog=0, notst=0, total=0;
  DATA.forEach(r => {
    const s = regionStats(r);
    done+=s.done; inprog+=s.inprog; notst+=s.notst; total+=s.total;
  });
  return { done, inprog, notst, total };
}

function themeStats(regionId, themeIdx) {
  const t = DATA.find(r=>r.id===regionId).themes[themeIdx];
  let done=0, total=t.actions.length;
  t.actions.forEach((_,ai) => {
    if(state[stateKey(regionId, themeIdx, ai)]?.status==="done") done++;
  });
  return { done, total, pct: total ? Math.round((done/total)*100) : 0 };
}

// ── ENTRY ──
function enterApp() {
  document.getElementById("entry-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  renderHome(); // show immediately with default state
  loadFromSheets(); // then update from Sheets
}

// ── HOME ──
function renderHome() {
  document.getElementById("home-view").style.display = "block";
  document.getElementById("region-view").style.display = "none";

  const gs = globalStats();

  document.getElementById("global-stats").innerHTML = `
    <div class="stat-card">
      <div class="stat-icon purple">✅</div>

    </div>
    <div class="stat-card">
      <div class="stat-icon yellow">⚡</div>
      <div class="stat-info"><p>In Progress</p><h3 class="yellow">${gs.inprog}</h3></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red">🔴</div>
      <div class="stat-info"><p>Not Started</p><h3 class="red">${gs.notst}</h3></div>
    </div>
  `;

  document.getElementById("regions-grid").innerHTML = DATA.map(r => {
    const s = regionStats(r);
    return `
      <div class="region-card" onclick="openRegion('${r.id}')">
        <div class="region-card-header">
          <div class="region-flag">${r.flag}</div>
          <div class="region-info">
            <h3>${r.name}</h3>
            <p>${r.sub} · ${r.themes.length} themes · ${s.total} actions</p>
          </div>
          <div class="region-arrow">→</div>
        </div>
        <div class="thermo-wrap">
          <div class="thermo-label">
            <span>Overall Progress</span>
            <strong>${s.pct}%</strong>
          </div>
          <div class="thermo-track"><div class="thermo-fill" style="width:${s.pct}%"></div></div>
        </div>
        <div class="region-status-row">
          <span class="mini-pill done">✓ ${s.done} Done</span>
          <span class="mini-pill progress">⚡ ${s.inprog} In Progress</span>
          <span class="mini-pill notstarted">○ ${s.notst} Not Started</span>
        </div>
      </div>
    `;
  }).join("");
}

// ── REGION VIEW ──
let currentRegionId = null;

function openRegion(regionId) {
  currentRegionId = null; // reset first to force fresh render
  currentRegionId = regionId;
  document.getElementById("home-view").style.display = "none";
  document.getElementById("region-view").style.display = "block";
  document.getElementById("region-view-content").innerHTML = ""; // clear previous
  renderRegion(regionId);
}

function goHome() { 
  currentRegionId = null;
  renderHome(); 
}

function renderRegion(regionId) {
  const r = DATA.find(x => x.id === regionId);
  const rs = regionStats(r);

  // Save which themes are currently open
  const openThemes = [];
  r.themes.forEach((_, ti) => {
    const body = document.getElementById(`tbody-${regionId}-${ti}`);
    if (body && body.classList.contains("open")) openThemes.push(ti);
  });

  let html = `
    <div class="region-view-header">
      <div class="region-view-flag">${r.flag}</div>
      <div class="region-view-info">
        <h2>${r.name}</h2>
        <p>${r.sub} · ${r.themes.length} themes · ${rs.total} actions</p>
      </div>
    </div>
    <div class="region-progress-bar">
      <span class="rpb-label">Overall Progress</span>
      <div class="rpb-track"><div class="rpb-fill" id="rpb-${regionId}" style="width:${rs.pct}%"></div></div>
      <span class="rpb-pct" id="rpb-pct-${regionId}">${rs.pct}%</span>
    </div>
  `;

  r.themes.forEach((theme, ti) => {
    const ts = themeStats(regionId, ti);
    html += `
      <div class="theme-block" id="theme-${regionId}-${ti}">
        <div class="theme-header" onclick="toggleTheme('${regionId}',${ti})">
          <div class="theme-header-left">
            <div class="theme-number">${ti+1}</div>
            <div class="theme-title">${theme.title}</div>
          </div>
          <div class="theme-header-right">
            <div class="theme-progress-mini">
              <div class="tpm-track"><div class="tpm-fill" id="tpm-${regionId}-${ti}" style="width:${ts.pct}%"></div></div>
              <span class="tpm-pct" id="tpm-pct-${regionId}-${ti}">${ts.pct}%</span>
            </div>
            <span class="theme-chevron" id="chev-${regionId}-${ti}">▼</span>
          </div>
        </div>
        <div class="theme-body" id="tbody-${regionId}-${ti}">
          ${theme.actions.map((action, ai) => renderAction(regionId, ti, ai, action)).join("")}
        </div>
      </div>
    `;
  });

  document.getElementById("region-view-content").innerHTML = html;

  // Restore open themes
  openThemes.forEach(ti => {
    const body = document.getElementById(`tbody-${regionId}-${ti}`);
    const chev = document.getElementById(`chev-${regionId}-${ti}`);
    if (body) body.classList.add("open");
    if (chev) chev.textContent = "▲";
  });
}

function softUpdateView() {
  // Update home cards without full re-render
  const appVisible = document.getElementById("app").style.display !== "none";
  if (!appVisible) return;

  const regionVisible = document.getElementById("region-view").style.display !== "none";

  if (!regionVisible) {
    // On home — just re-render home (no textareas there)
    renderHome();
    return;
  }

  if (!currentRegionId) return;

  // On region view — soft update only: progress bars + status buttons
  const r = DATA.find(x => x.id === currentRegionId);
  if (!r) return;

  // Update region progress bar
  const rs = regionStats(r);
  const rpbFill = document.getElementById(`rpb-${currentRegionId}`);
  const rpbPct = document.getElementById(`rpb-pct-${currentRegionId}`);
  if (rpbFill) rpbFill.style.width = rs.pct + "%";
  if (rpbPct) rpbPct.textContent = rs.pct + "%";

  // Update each action's status buttons and theme progress
  r.themes.forEach((theme, ti) => {
    // Update theme progress mini bar
    const ts = themeStats(currentRegionId, ti);
    const tpmFill = document.getElementById(`tpm-${currentRegionId}-${ti}`);
    const tpmPct = document.getElementById(`tpm-pct-${currentRegionId}-${ti}`);
    if (tpmFill) tpmFill.style.width = ts.pct + "%";
    if (tpmPct) tpmPct.textContent = ts.pct + "%";

    // Update each action's status buttons
    theme.actions.forEach((_, ai) => {
      const k = stateKey(currentRegionId, ti, ai);
      const s = state[k];
      if (!s) return;

      const row = document.getElementById(`action-${currentRegionId}-${ti}-${ai}`);
      if (!row) return; // theme not open, skip

      const btns = row.querySelectorAll(".status-btn");
      if (btns.length === 0) return;

      const map = ["not-started","in-progress","done"];
      const classMap = { "not-started":"active-notstarted","in-progress":"active-inprogress","done":"active-done" };
      btns.forEach((b, i) => {
        b.className = "status-btn";
        if (map[i] === s.status) b.classList.add(classMap[s.status]);
      });

      // Update note previews (only if notes area is closed to avoid disrupting typing)
      const notesArea = document.getElementById(`notes-area-${currentRegionId}-${ti}-${ai}`);
      const isTyping = notesArea && notesArea.classList.contains("open");
      if (!isTyping) {
        const preview = document.getElementById(`note-preview-${currentRegionId}-${ti}-${ai}`);
        if (preview) preview.innerHTML = buildNotesList(s.notes || [], currentRegionId, ti, ai);
      }
    });
  });
}

function buildNotesList(notes, regionId, ti, ai) {
  if (!notes || notes.length === 0) return "";
  return notes.map((n, idx) => {
    const escaped = n.text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const formatted = escaped.split("\n").join("<br>");
    return `<div class="note-item" id="note-item-${regionId}-${ti}-${ai}-${idx}">
      <span class="note-bullet">📝</span>
      <div class="note-item-body">
        <div class="note-item-text" id="note-text-${regionId}-${ti}-${ai}-${idx}">${formatted}</div>
        <div class="note-edit-area" id="note-edit-${regionId}-${ti}-${ai}-${idx}" style="display:none;">
          <textarea class="notes-textarea" id="note-edit-ta-${regionId}-${ti}-${ai}-${idx}" 
            style="min-height:60px;margin-top:4px;">${n.text}</textarea>
          <div style="display:flex;gap:6px;margin-top:4px;">
            <button class="notes-save-btn" onclick="confirmEditNote('${regionId}',${ti},${ai},${idx})">Save</button>
            <button class="notes-save-btn" style="background:var(--surface3);color:var(--text2);" 
              onclick="cancelEditNote('${regionId}',${ti},${ai},${idx})">Cancel</button>
          </div>
        </div>
        ${n.time ? `<div class="note-item-time">${n.time}</div>` : ""}
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;">
        <button class="note-edit-btn" onclick="startEditNote('${regionId}',${ti},${ai},${idx})" title="Edit">✏️</button>
        <button class="note-delete-btn" onclick="deleteNote('${regionId}',${ti},${ai},${idx})" title="Delete">×</button>
      </div>
    </div>`;
  }).join("");
}

function startEditNote(regionId, ti, ai, idx) {
  document.getElementById(`note-text-${regionId}-${ti}-${ai}-${idx}`).style.display = "none";
  document.getElementById(`note-edit-${regionId}-${ti}-${ai}-${idx}`).style.display = "block";
}

function cancelEditNote(regionId, ti, ai, idx) {
  document.getElementById(`note-text-${regionId}-${ti}-${ai}-${idx}`).style.display = "block";
  document.getElementById(`note-edit-${regionId}-${ti}-${ai}-${idx}`).style.display = "none";
}

function confirmEditNote(regionId, ti, ai, idx) {
  const ta = document.getElementById(`note-edit-ta-${regionId}-${ti}-${ai}-${idx}`);
  const text = ta.value.trim();
  if (!text) return;
  const k = stateKey(regionId, ti, ai);
  state[k].notes[idx].text = text;
  saveState();
  saveToSheets(k);
  const preview = document.getElementById(`note-preview-${regionId}-${ti}-${ai}`);
  preview.innerHTML = buildNotesList(state[k].notes, regionId, ti, ai);
  showToast("Note updated");
}

function renderAction(regionId, ti, ai, actionText) {
  const k = stateKey(regionId, ti, ai);
  const s = state[k] || { status: "not-started", notes: "" };
  const notePreview = buildNotesList(s.notes || [], regionId, ti, ai);

  return `
    <div class="action-row" id="action-${regionId}-${ti}-${ai}">
      <div class="action-index">${ai+1}</div>
      <div class="action-content">
        <div class="action-title">${actionText}</div>
        <div class="action-meta">
          <div class="status-btn-group">
            <button class="status-btn ${s.status==='not-started'?'active-notstarted':''}" onclick="setStatus('${regionId}',${ti},${ai},'not-started')">Not Started</button>
            <button class="status-btn ${s.status==='in-progress'?'active-inprogress':''}" onclick="setStatus('${regionId}',${ti},${ai},'in-progress')">In Progress</button>
            <button class="status-btn ${s.status==='done'?'active-done':''}" onclick="setStatus('${regionId}',${ti},${ai},'done')">Done</button>
          </div>
        </div>
        <div class="action-notes-wrap">
          <button class="notes-toggle" onclick="toggleNotes('${regionId}',${ti},${ai})">
            <span id="notes-icon-${regionId}-${ti}-${ai}">＋</span> Notes & Observations
          </button>
          <div class="notes-area" id="notes-area-${regionId}-${ti}-${ai}">
            <textarea class="notes-textarea" id="notes-ta-${regionId}-${ti}-${ai}"
              placeholder="Add observation... (Enter for new line)"></textarea>
            <button class="notes-save-btn" onclick="saveNotes('${regionId}',${ti},${ai})">Add Note</button>
          </div>
          <div id="note-preview-${regionId}-${ti}-${ai}">${notePreview}</div>
        </div>
      </div>
    </div>
  `;
}

// ── INTERACTIONS ──
function toggleTheme(regionId, ti) {
  const body = document.getElementById(`tbody-${regionId}-${ti}`);
  const chev = document.getElementById(`chev-${regionId}-${ti}`);
  body.classList.toggle("open");
  chev.textContent = body.classList.contains("open") ? "▲" : "▼";
}

function setStatus(regionId, ti, ai, status) {
  const k = stateKey(regionId, ti, ai);
  if (!state[k]) state[k] = { status, notes: "" };
  else state[k].status = status;
  saveState();

  const row = document.getElementById(`action-${regionId}-${ti}-${ai}`);
  const btns = row.querySelectorAll(".status-btn");
  btns.forEach(b => b.className = "status-btn");
  const map = ["not-started","in-progress","done"];
  const classMap = { "not-started":"active-notstarted","in-progress":"active-inprogress","done":"active-done" };
  btns.forEach((b,i) => { if(map[i]===status) b.classList.add(classMap[status]); });

  updateProgressBars(regionId, ti);
  saveToSheets(k);
  showToast("Status updated");
}

function updateProgressBars(regionId, ti) {
  const ts = themeStats(regionId, ti);
  const tpmFill = document.getElementById(`tpm-${regionId}-${ti}`);
  const tpmPct = document.getElementById(`tpm-pct-${regionId}-${ti}`);
  if(tpmFill) tpmFill.style.width = ts.pct + "%";
  if(tpmPct) tpmPct.textContent = ts.pct + "%";

  const rs = regionStats(DATA.find(r=>r.id===regionId));
  const rpbFill = document.getElementById(`rpb-${regionId}`);
  const rpbPct = document.getElementById(`rpb-pct-${regionId}`);
  if(rpbFill) rpbFill.style.width = rs.pct + "%";
  if(rpbPct) rpbPct.textContent = rs.pct + "%";
}

function toggleNotes(regionId, ti, ai) {
  const area = document.getElementById(`notes-area-${regionId}-${ti}-${ai}`);
  const icon = document.getElementById(`notes-icon-${regionId}-${ti}-${ai}`);
  area.classList.toggle("open");
  icon.textContent = area.classList.contains("open") ? "−" : "＋";
}

function saveNotes(regionId, ti, ai) {
  const ta = document.getElementById(`notes-ta-${regionId}-${ti}-${ai}`);
  const text = ta.value.trim();
  if (!text) return;
  const k = stateKey(regionId, ti, ai);
  if (!state[k]) state[k] = { status: "not-started", notes: [] };
  if (!Array.isArray(state[k].notes)) state[k].notes = [];
  const now = new Date();
  const time = now.toLocaleDateString("en-GB", { day:"2-digit", month:"short" }) + " " + now.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" });
  state[k].notes.push({ text, time });
  saveState();
  saveToSheets(k);
  ta.value = "";
  const preview = document.getElementById(`note-preview-${regionId}-${ti}-${ai}`);
  preview.innerHTML = buildNotesList(state[k].notes, regionId, ti, ai);
  showToast("Note added");
}

function deleteNote(regionId, ti, ai, idx) {
  const k = stateKey(regionId, ti, ai);
  if (!state[k] || !state[k].notes) return;
  state[k].notes.splice(idx, 1);
  saveState();
  saveToSheets(k);
  const preview = document.getElementById(`note-preview-${regionId}-${ti}-${ai}`);
  preview.innerHTML = buildNotesList(state[k].notes, regionId, ti, ai);
  showToast("Note removed");
}

function autoSaveNotes(regionId, ti, ai) {}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  document.getElementById("toast-msg").textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
}

function backToEntry() {
  document.getElementById("app").style.display = "none";
  document.getElementById("entry-screen").style.display = "flex";
}

// ── GOOGLE SHEETS API ──
const API_URL = "https://script.google.com/macros/s/AKfycbyfVPogbt3Rusu4iCxp4hjIjRheVuDE5R2WSgFf0hwZbSir6rUgpBlBbpU2SvpsHxdENw/exec";

async function loadFromSheets() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const data = await res.json();
    Object.keys(data).forEach(key => {
      // Skip keys recently saved by this user — they haven't reached Sheets yet
      if (pendingSaves[key]) return;
      state[key] = {
        status: data[key].status || "not-started",
        notes: data[key].notes || []
      };
    });
    saveState();
    showToast("Synced ✓");
    softUpdateView();
  } catch(e) {
    console.warn("Could not load from Sheets", e);
  }
}

async function pushAllToSheets() {
  // Push every single action to Sheets so all keys exist there
  const keys = Object.keys(state);
  for (const k of keys) {
    await saveToSheets(k);
  }
  showToast("All synced to Sheets ✓");
}

function saveToSheets(key) {
  // Mark as pending — protect from sync overwrite for 10 seconds
  pendingSaves[key] = Date.now();
  setTimeout(() => { delete pendingSaves[key]; }, 10000);

  const s = state[key];
  fetch(API_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ key, status: s.status, notes: s.notes || [] })
  }).catch(e => console.warn("Could not save to Sheets", e));
}

// ── INIT ──
loadTheme();
loadState();
initState();

// Auto-sync every 30 seconds
setInterval(() => {
  if (document.getElementById("app").style.display !== "none") {
    loadFromSheets();
  }
}, 30000);
// Load from Sheets on startup
loadFromSheets().then(async () => {
  // If Sheets is empty, push all defaults
  const empty = Object.keys(state).every(k => !state[k] || state[k].status === "not-started" && (!state[k].notes || state[k].notes.length === 0));
  // Check Sheet directly
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const data = await res.json();
    if (Object.keys(data).length === 0) {
      await pushAllToSheets();
    }
  } catch(e) {}
});
